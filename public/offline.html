<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline</title>
    <style>
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #f7f5ef; color: #1c1b18; font-family: system-ui, -apple-system, Segoe UI, sans-serif; }
      .box { text-align: center; padding: 24px; }
      h1 { letter-spacing: -0.04em; }
      p { color: #6d665b; }
      a { display: inline-block; margin-top: 12px; padding: 11px 16px; border-radius: 12px; background: #84632a; color: #fff; font-weight: 700; text-decoration: none; }
    </style>
  </head>
  <body>
    <div class="box">
      <h1>You&rsquo;re offline</h1>
      <p>This app needs a connection to show live numbers.<br />Reconnect and try again.</p>
      <a href="/hub">Retry</a>
    </div>
  </body>
</html>
